name: Pull Docker Image

on:
  workflow_dispatch:
    inputs:
      docker_image:
        description: "The name of the docker image to pull."
        required: true
        type: string
      docker_tag:
        description: "The tag of the docker image to pull."
        required: true
        type: string

env:
  DOCKER_HOST: ${{ vars.DOCKER_HOST }}
  DOCKER_REPO: ${{ vars.DOCKER_REPO }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
  DOCKER_IMAGE: ${{ github.event.inputs.docker_image }}
  DOCKER_TAG: ${{ github.event.inputs.docker_tag }}


jobs:
  pull-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Login to docker repository
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_HOST }}
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - name: Pull the docker image
        run: |
          docker pull ${DOCKER_HOST}/${DOCKER_REPO}/${DOCKER_IMAGE}:${DOCKER_TAG}
